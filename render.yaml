services:
  - type: web
    name: contract-review-orchestrator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app_ui.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: LLM_PROVIDER
        value: anthropic
      - key: PARSER_TYPE
        value: pypdf
      - key: RECURSION_LIMIT
        value: "5"
      - key: DATABASE_URL
        value: sqlite:///./contract_orchestrator.db
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLAMA_CLOUD_API_KEY
        sync: false
      - key: SIMPLYRETS_KEY
        value: simplyrets
      - key: SIMPLYRETS_SECRET
        value: simplyrets
